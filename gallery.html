<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Morrowind Visualisation Project</title>
    <!-- Unlisted page: kept out of the nav and out of search results, but still
         shareable as a link (the og: tags below build a normal preview card). -->
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Morrowind Visualisation Project">
    <meta property="og:title" content="Gallery">
    <meta property="og:url" content="https://morrowvis.com/gallery">
    <meta property="og:image" content="https://morrowvis.com/images/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body data-page="gallery">
    <div id="navbarMount"></div>

    <section class="gallery-hero">
        <div class="container">
            <h1>Gallery</h1>
        </div>
    </section>

    <section class="gallery-section">
        <div class="gallery-grid" id="galleryGrid"></div>
    </section>

    <div id="footerMount"></div>

    <script>window.SITE_BASE = '';</script>
    <script src="nav.js"></script>
    <script src="gallery/gallery-data.js"></script>
    <script>
        (function () {
            const THUMBS = 'gallery/thumbs/';
            const FULL   = 'gallery/full/';

            const grid = document.getElementById('galleryGrid');
            if (typeof GALLERY === 'undefined' || !GALLERY.length) return;

            GALLERY.forEach(function (item, i) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'gallery-item';
                btn.setAttribute('aria-label', 'Open image ' + (i + 1) + ' of ' + GALLERY.length);

                const img = document.createElement('img');
                img.src = THUMBS + item.file;
                // Intrinsic size from the manifest: lets the browser reserve the
                // slot before the image arrives, so the grid doesn't jump.
                img.width = item.w;
                img.height = item.h;
                img.loading = 'lazy';
                img.decoding = 'async';
                img.alt = '';

                btn.appendChild(img);
                btn.addEventListener('click', function () { openAt(i); });
                grid.appendChild(btn);
            });

            const lb = document.createElement('div');
            lb.className = 'lightbox';
            lb.innerHTML =
                '<button type="button" class="lightbox-close" aria-label="Close">&times;</button>' +
                '<button type="button" class="lightbox-nav lightbox-prev" aria-label="Previous image">&#10094;</button>' +
                '<button type="button" class="lightbox-nav lightbox-next" aria-label="Next image">&#10095;</button>' +
                '<div class="lightbox-stage"><img class="lightbox-img" alt=""></div>' +
                '<div class="lightbox-spinner" role="status" aria-label="Loading image"></div>';
            document.body.appendChild(lb);

            const lbImg = lb.querySelector('.lightbox-img');
            let index = -1;
            let lastFocus = null;
            let spinTimer = null;

            // Anything that loads faster than this never shows a spinner - below
            // roughly this long it reads as a glitch rather than as progress.
            const SPINNER_DELAY = 180;

            function show(i) {
                index = (i + GALLERY.length) % GALLERY.length;
                const item = GALLERY[index];
                const wanted = index;

                // The current image is deliberately left in place for now: it is
                // only hidden if the next one turns out to be slow (below), so a
                // cached image swaps straight in with no black frame between.
                clearTimeout(spinTimer);
                lb.classList.remove('is-loading');

                const full = new Image();

                function reveal() {
                    if (index !== wanted) return;   // moved on before it finished
                    clearTimeout(spinTimer);
                    lbImg.src = full.src;
                    lb.classList.remove('is-loading');
                }

                full.onload = reveal;
                full.onerror = function () {
                    clearTimeout(spinTimer);
                    lb.classList.remove('is-loading');
                };
                full.src = FULL + item.file;

                if (full.complete) {
                    // Already in cache (revisit, or a local/fast disk): onload
                    // still fires async, so without this the spinner would flash
                    // for a frame on an image that was ready instantly.
                    reveal();
                } else {
                    // Only once it's clearly slow: fades the previous image out
                    // and brings the spinner up together.
                    spinTimer = setTimeout(function () {
                        if (index === wanted) lb.classList.add('is-loading');
                    }, SPINNER_DELAY);
                }
            }

            function openAt(i) {
                lastFocus = document.activeElement;

                // Locking the body hides the page's scrollbar, which widens the
                // viewport by its width - and since the lightbox is sized to the
                // viewport, the image would visibly jump as it opened. Measure
                // the scrollbar first and hold both the page and the lightbox at
                // their pre-lock width.
                const sbw = window.innerWidth - document.documentElement.clientWidth;
                if (sbw > 0) {
                    document.body.style.paddingRight = sbw + 'px';
                    lb.style.right = sbw + 'px';
                }
                document.body.classList.add('lightbox-open');

                lb.classList.add('open');
                show(i);
                lb.querySelector('.lightbox-close').focus();
            }

            function close() {
                clearTimeout(spinTimer);   // else a pending spinner appears after closing
                hideNav();                 // don't reappear pre-revealed next time
                lb.classList.remove('open', 'is-loading');
                document.body.classList.remove('lightbox-open');
                document.body.style.paddingRight = '';
                lb.style.right = '';
                lbImg.removeAttribute('src');   // stop any in-flight download
                index = -1;
                if (lastFocus) lastFocus.focus();
            }

            lb.querySelector('.lightbox-close').addEventListener('click', close);
            lb.querySelector('.lightbox-prev').addEventListener('click', function () { show(index - 1); });
            lb.querySelector('.lightbox-next').addEventListener('click', function () { show(index + 1); });

            // Backdrop click closes; clicks on the image or controls must not.
            lb.addEventListener('click', function (e) {
                // A swipe is followed by a click, which would otherwise close the
                // lightbox the moment you tried to change image.
                if (swiped) { swiped = false; return; }
                if (e.target === lb || e.target.classList.contains('lightbox-stage')) close();
            });

            // Arrows stay hidden until the pointer nears that edge of the screen,
            // so they don't sit over the image while you're looking at it.
            const EDGE_ZONE = 200;   // px from either edge that reveals an arrow

            lb.addEventListener('mousemove', function (e) {
                lb.classList.toggle('show-prev', e.clientX < EDGE_ZONE);
                lb.classList.toggle('show-next', e.clientX > window.innerWidth - EDGE_ZONE);
            });

            lb.addEventListener('mouseleave', hideNav);

            function hideNav() {
                lb.classList.remove('show-prev', 'show-next');
            }

            // Swipe left/right to move between images on touch.
            const SWIPE_MIN = 50;    // px of travel before it counts as a swipe
            let touchX = 0, touchY = 0, swiped = false;

            lb.addEventListener('touchstart', function (e) {
                if (e.touches.length !== 1) return;   // ignore pinch/zoom
                swiped = false;
                touchX = e.touches[0].clientX;
                touchY = e.touches[0].clientY;
            }, { passive: true });

            lb.addEventListener('touchend', function (e) {
                if (!e.changedTouches.length) return;
                const dx = e.changedTouches[0].clientX - touchX;
                const dy = e.changedTouches[0].clientY - touchY;
                // Must be mostly horizontal, so a scroll-ish drag doesn't navigate.
                if (Math.abs(dx) > SWIPE_MIN && Math.abs(dx) > Math.abs(dy)) {
                    swiped = true;
                    show(index + (dx < 0 ? 1 : -1));
                }
            }, { passive: true });

            document.addEventListener('keydown', function (e) {
                if (!lb.classList.contains('open')) return;
                if (e.key === 'Escape') close();
                else if (e.key === 'ArrowLeft') show(index - 1);
                else if (e.key === 'ArrowRight') show(index + 1);
            });
        })();
    </script>
</body>
</html>
