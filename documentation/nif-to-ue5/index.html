<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIF to UE5 | Morrowind Visualisation Project</title>
    <meta name="description" content="How Morrowind NIF meshes are converted and brought into Unreal Engine 5.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Morrowind Visualisation Project">
    <meta property="og:title" content="NIF to UE5">
    <meta property="og:description" content="How Morrowind NIF meshes are converted and brought into Unreal Engine 5.">
    <meta property="og:url" content="https://morrowvis.com/documentation/nif-to-ue5/">
    <meta property="og:image" content="https://morrowvis.com/images/og-image.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="../../style.css">
    <link rel="icon" type="image/svg+xml" href="../../images/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body data-page="nif-to-ue5">
    <div id="navbarMount"></div>

    <section class="doc-content">
        <div class="container doc-layout">
            <div class="doc-main-wrap">
            <div class="doc-main">
                <h1>NIF to UE5</h1>
                <div id="pipelineRoot"></div>
            </div>
            </div>
            <aside class="doc-sidebar" id="pipelineSidebarMount"></aside>
        </div>
    </section>

    <div id="footerMount"></div>
    <script>window.SITE_BASE = '../../';</script>
    <script src="../../nav.js"></script>
    <script src="../doc-sidebar.js"></script>
    <script src="data.js"></script>
    <script>
        (function () {
            const root = document.getElementById('pipelineRoot');
            const sidebarTree = [];

            SECTIONS.forEach(function (section) {
                const id = docSlugify(section.title);
                // Plain h3, matching how Goals/Roadmap render their section
                // headings - rather than the 2rem credits-group-title.
                const h3 = document.createElement('h3');
                h3.textContent = section.title;
                addHeadingAnchor(h3, id);
                root.appendChild(h3);

                if (section.items) {
                    const ul = document.createElement('ul');
                    ul.className = 'goal-list';
                    section.items.forEach(function (html) {
                        const li = document.createElement('li');
                        li.innerHTML = html;
                        ul.appendChild(li);
                    });
                    root.appendChild(ul);
                }

                if (section.subsections) {
                    section.subsections.forEach(function (sub) {
                        // Just bold text, not another heading step.
                        const subHeading = document.createElement('h4');
                        subHeading.className = 'doc-subheading';
                        subHeading.textContent = sub.subtitle;
                        root.appendChild(subHeading);

                        const ul = document.createElement('ul');
                        ul.className = 'goal-list';
                        sub.items.forEach(function (html) {
                            const li = document.createElement('li');
                            li.innerHTML = html;
                            ul.appendChild(li);
                        });
                        root.appendChild(ul);
                    });
                }

                sidebarTree.push({ label: section.title, id: id });
            });

            renderDocSidebar(document.getElementById('pipelineSidebarMount'), sidebarTree);
        })();
    </script>
</body>
</html>
