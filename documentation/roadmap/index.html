<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap | Morrowind Visualisation Project</title>
    <meta name="description" content="Planned and completed work on the Morrowind Visualisation Project.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Morrowind Visualisation Project">
    <meta property="og:title" content="Roadmap">
    <meta property="og:description" content="Planned and completed work on the Morrowind Visualisation Project.">
    <meta property="og:url" content="https://morrowvis.com/documentation/roadmap/">
    <meta property="og:image" content="https://morrowvis.com/images/og-image.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="../../style.css">
    <link rel="icon" type="image/svg+xml" href="../../images/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body data-page="roadmap">
    <div id="navbarMount"></div>

    <section class="doc-content">
        <div class="container doc-layout">
            <div class="doc-main-wrap">
            <div class="doc-main">
                <h1>Roadmap</h1>
                <div id="roadmapRoot"></div>
            </div>
            </div>
            <aside class="doc-sidebar" id="roadmapSidebarMount"></aside>
        </div>
    </section>

    <div id="footerMount"></div>
    <script>window.SITE_BASE = '../../';</script>
    <script src="../../nav.js"></script>
    <script src="../doc-sidebar.js"></script>
    <script src="roadmap-data.js"></script>
    <script>
        (function () {
            const root = document.getElementById('roadmapRoot');
            const sidebarTree = [];

            ROADMAP.forEach(function (group) {
                const id = docSlugify(group.title);
                const wrap = document.createElement('div');
                wrap.className = 'roadmap-group';

                const h3 = document.createElement('h3');
                h3.textContent = group.title;
                addHeadingAnchor(h3, id);
                wrap.appendChild(h3);

                const ul = document.createElement('ul');
                ul.className = 'roadmap-list';
                group.items.forEach(function (html) {
                    const li = document.createElement('li');
                    li.innerHTML = html;
                    ul.appendChild(li);
                });
                wrap.appendChild(ul);

                root.appendChild(wrap);
                sidebarTree.push({ label: group.title, id: id });
            });

            renderDocSidebar(document.getElementById('roadmapSidebarMount'), sidebarTree);
        })();
    </script>
</body>
</html>
