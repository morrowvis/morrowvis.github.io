<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals | Morrowind Visualisation Project</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="icon" type="image/svg+xml" href="../../logos/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body data-page="goals">
    <div id="navbarMount"></div>

    <section class="doc-content">
        <div class="container doc-layout">
            <aside class="doc-sidebar" id="goalsSidebarMount"></aside>
            <div class="doc-main">
                <p class="doc-crumb"><a href="../">Documentation</a> / Goals</p>
                <h1>Goals</h1>
                <div id="goalsRoot"></div>
            </div>
        </div>
    </section>

    <div id="footerMount"></div>
    <script>window.SITE_BASE = '../../';</script>
    <script src="../../nav.js"></script>
    <script src="../doc-sidebar.js"></script>
    <script src="goals-data.js"></script>
    <script>
        (function () {
            const root = document.getElementById('goalsRoot');

            function makeList(items, className) {
                const ul = document.createElement('ul');
                ul.className = className;
                items.forEach(function (html) {
                    const li = document.createElement('li');
                    li.innerHTML = html;
                    ul.appendChild(li);
                });
                return ul;
            }

            const overviewList = makeList(GOALS_MAIN, 'goal-list');
            overviewList.id = 'overview';
            overviewList.style.scrollMarginTop = '90px';
            root.appendChild(overviewList);

            const hint = document.createElement('div');
            hint.className = 'doc-hint';
            hint.textContent = GOALS_HINT;
            root.appendChild(hint);

            const sidebarTree = [{ label: 'Overview', id: 'overview' }];

            GOALS_SECTIONS.forEach(function (section) {
                const id = docSlugify(section.title);
                const h3 = document.createElement('h3');
                h3.textContent = section.title;
                addHeadingAnchor(h3, id);
                root.appendChild(h3);

                if (section.seeAlso) {
                    const p = document.createElement('p');
                    p.className = 'see-also';
                    p.innerHTML = section.seeAlso;
                    root.appendChild(p);
                }

                root.appendChild(makeList(section.items, 'goal-list'));
                sidebarTree.push({ label: section.title, id: id });
            });

            renderDocSidebar(document.getElementById('goalsSidebarMount'), sidebarTree);
        })();
    </script>
</body>
</html>
