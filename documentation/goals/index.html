<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals | Morrowind Visualisation Project</title>
    <meta name="description" content="What the Morrowind Visualisation Project sets out to do, and what it deliberately does not.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Morrowind Visualisation Project">
    <meta property="og:title" content="Goals">
    <meta property="og:description" content="What the Morrowind Visualisation Project sets out to do, and what it deliberately does not.">
    <meta property="og:url" content="https://morrowvis.com/documentation/goals/">
    <meta property="og:image" content="https://morrowvis.com/images/og-image.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="../../style.css">
    <link rel="icon" type="image/svg+xml" href="../../images/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body data-page="goals">
    <div id="navbarMount"></div>

    <section class="doc-content">
        <div class="container doc-layout">
            <div class="doc-main-wrap">
            <div class="doc-main">
                <h1>Goals</h1>
                <div id="goalsRoot"></div>
            </div>
            </div>
            <aside class="doc-sidebar" id="goalsSidebarMount"></aside>
        </div>
    </section>

    <div id="footerMount"></div>
    <script>window.SITE_BASE = '../../';</script>
    <script src="../../nav.js"></script>
    <script src="../doc-sidebar.js"></script>
    <script src="goals-data.js"></script>
    <script>
        (function () {
            // Flip to false to remove the coloured background panel behind the
            // overview list - the rest of the page is unaffected either way.
            const GOALS_COLOR_PANEL = true;

            const root = document.getElementById('goalsRoot');

            function makeList(items, className) {
                const ul = document.createElement('ul');
                ul.className = className;
                items.forEach(function (html) {
                    const li = document.createElement('li');
                    li.innerHTML = html;
                    ul.appendChild(li);
                });
                return ul;
            }

            const overviewWrap = document.createElement('div');
            overviewWrap.id = 'overview';
            overviewWrap.style.scrollMarginTop = '110px';
            if (GOALS_COLOR_PANEL) {
                overviewWrap.className = 'credits-panel panel-blue';
            }
            overviewWrap.appendChild(makeList(GOALS_MAIN, 'goal-list'));
            root.appendChild(overviewWrap);

            const hint = document.createElement('div');
            hint.className = 'doc-hint';
            GOALS_HINT.forEach(function (text) {
                const p = document.createElement('p');
                p.textContent = text;
                hint.appendChild(p);
            });
            root.appendChild(hint);

            const sidebarTree = [{ label: 'Overview', id: 'overview' }];

            GOALS_SECTIONS.forEach(function (section) {
                const id = docSlugify(section.title);
                const h3 = document.createElement('h3');
                h3.textContent = section.title;
                addHeadingAnchor(h3, id);
                root.appendChild(h3);

                if (section.seeAlso) {
                    const p = document.createElement('p');
                    p.className = 'see-also';
                    p.innerHTML = section.seeAlso;
                    root.appendChild(p);
                }

                root.appendChild(makeList(section.items, 'goal-list'));
                sidebarTree.push({ label: section.title, id: id });
            });

            renderDocSidebar(document.getElementById('goalsSidebarMount'), sidebarTree);
        })();
    </script>
</body>
</html>
