<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to UE5 | Morrowind Visualisation Project</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="icon" type="image/svg+xml" href="../../images/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body data-page="json-to-ue5">
    <div id="navbarMount"></div>

    <section class="doc-content">
        <div class="container doc-layout">
            <div class="doc-main-wrap">
            <div class="doc-main">
                <h1>JSON to UE5</h1>
                <div id="pipelineRoot"></div>
            </div>
            </div>
            <aside class="doc-sidebar" id="pipelineSidebarMount"></aside>
        </div>
    </section>

    <div id="footerMount"></div>
    <script>window.SITE_BASE = '../../';</script>
    <script src="../../nav.js"></script>
    <script src="../doc-sidebar.js"></script>
    <script src="data.js"></script>
    <script>
        (function () {
            const root = document.getElementById('pipelineRoot');
            const sidebarTree = [];

            SECTIONS.forEach(function (section) {
                const id = docSlugify(section.title);
                const h2 = document.createElement('h2');
                h2.className = 'credits-group-title';
                h2.textContent = section.title;
                addHeadingAnchor(h2, id);
                root.appendChild(h2);

                if (section.items) {
                    const ul = document.createElement('ul');
                    ul.className = 'goal-list';
                    section.items.forEach(function (html) {
                        const li = document.createElement('li');
                        li.innerHTML = html;
                        ul.appendChild(li);
                    });
                    root.appendChild(ul);
                }

                if (section.subsections) {
                    section.subsections.forEach(function (sub) {
                        const h3 = document.createElement('h3');
                        h3.textContent = sub.subtitle;
                        root.appendChild(h3);

                        const ul = document.createElement('ul');
                        ul.className = 'goal-list';
                        sub.items.forEach(function (html) {
                            const li = document.createElement('li');
                            li.innerHTML = html;
                            ul.appendChild(li);
                        });
                        root.appendChild(ul);
                    });
                }

                sidebarTree.push({ label: section.title, id: id });
            });

            renderDocSidebar(document.getElementById('pipelineSidebarMount'), sidebarTree);
        })();
    </script>
</body>
</html>
